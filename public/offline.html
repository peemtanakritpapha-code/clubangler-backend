<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ออฟไลน์อยู่ — ClubAngler</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #F4F7F7; font-family: system-ui, -apple-system, sans-serif; }
    .box { text-align: center; padding: 32px 24px; }
    .icon { width: 88px; height: 88px; border-radius: 22px; background: #0E7E8C; display: grid; place-items: center; margin: 0 auto 16px; font-size: 44px; }
    h1 { font-size: 19px; color: #101314; margin: 0 0 8px; }
    p { font-size: 13.5px; color: #6B7678; line-height: 1.7; margin: 0 0 18px; }
    button { height: 46px; padding: 0 28px; border: none; border-radius: 11px; background: #0E7E8C; color: #fff; font-weight: 800; font-size: 14px; cursor: pointer; font-family: inherit; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">🎣</div>
    <h1>ยังไม่มีสัญญาณอินเทอร์เน็ต</h1>
    <p>ClubAngler ต้องใช้อินเทอร์เน็ตเพื่อแสดงข้อมูลล่าสุด<br />เช็คสัญญาณแล้วลองใหม่อีกครั้งครับ</p>
    <button onclick="location.reload()">ลองอีกครั้ง</button>
  </div>
</body>
</html>
